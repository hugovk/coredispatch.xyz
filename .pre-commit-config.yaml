repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: sh -c 'cd backend && uv run python -m pyright .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: frontend-typecheck
        name: frontend typecheck
        entry: sh -c 'cd frontend && bun run typecheck'
        language: system
        files: ^frontend/
        pass_filenames: false

      - id: frontend-lint
        name: frontend lint
        entry: sh -c 'cd frontend && bun run lint'
        language: system
        files: ^frontend/
        pass_filenames: false
